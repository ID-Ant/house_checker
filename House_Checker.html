<script>
const form = document.querySelector('form');
form.addEventListener('submit', function(event) {
  event.preventDefault();
  const principal = parseFloat(document.querySelector('#principal').value);
  const interestRate = parseFloat(document.querySelector('#interestRate').value);
  const term = parseInt(document.querySelector('#term').value);

  let interestPayment, capitalPayment;

   const monthlyInterestRate = (interestRate / 100) / 12;
    const numberOfPayments = term * 12;
    interestPayment = principal * (interestRate / 100) / 12;
    capitalPayment = (principal * monthlyInterestRate) / (1 - Math.pow(1 + monthlyInterestRate, -numberOfPayments));

  document.querySelector('#result').innerHTML = `<p>Interest Payment: £ ${interestPayment.toFixed(2)}</p>`;
  document.querySelector('#result').innerHTML += `<p>Capital Payment: £ ${capitalPayment.toFixed(2)}</p>`;
});
  </script>
